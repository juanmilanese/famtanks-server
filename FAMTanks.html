// client loop: send my input up, draw the mirrored state (terrain rebuilt from snapshot grid)
let _clientInputAcc=0;
function clientLoop(){
  if(!running)return;
  readInputRaw();
  // send input every frame (~60/sec): input is tiny (~60 bytes) and this keeps
  // shooting + aim crisp on the server. Movement is predicted locally regardless.
  net.sendInput({...input});
  net.step();
  if(net.grid && (!terrainCanvas || net._terrainDirty)){ buildTerrain(); net._terrainDirty=false; }
  drainEvents();
  ctx.save();
  if(shake>0){ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);shake*=.85;if(shake<.3)shake=0;}
  if(net.grid){ drawTerrain();drawSpawnBeacons();drawWalls();drawBeacons();drawPickups();drawTrail();drawBullets();
    for(const p of net.getPlayers())drawTank(p);
    drawParticles();drawFloaters();drawLocatorRing();drawStartCountdown(); }
  ctx.restore();
  updateHUD();
  if(!net._running){ running=false; showResults(); return; }
  requestAnimationFrame(clientLoop);
}


// Blast-door transition: doors slam shut (staccato), clunk, then onShut() runs (starts the
// game + countdown) WHILE the doors open to reveal the arena. Fast, nostalgic. On top of all.
// Full cycle: doors slam shut (staccato) -> clunk -> onShut() runs WHILE doors open to reveal.
function runBlastDoors(onShut){
  const wrap=document.getElementById('blastdoors');
  const top=wrap.querySelector('.door-top'), bot=wrap.querySelector('.door-bot');
  wrap.classList.add('active');
  top.style.transition='none'; bot.style.transition='none';
  top.style.transform='translateY(-100%)'; bot.style.transform='translateY(100%)'; // start open
  requestAnimationFrame(()=>{
    top.style.transition='transform .27s cubic-bezier(.5,0,.9,.4)';
    bot.style.transition='transform .27s cubic-bezier(.5,0,.9,.4)';
    top.style.transform='translateY(0)'; bot.style.transform='translateY(0)';   // close
    Sound.doorClose();
  });
  setTimeout(()=>{
    Sound.doorClunk();
    if(onShut) onShut();          // swap content (game/lobby) behind the shut doors
    requestAnimationFrame(()=>{
      top.style.transition='transform .47s cubic-bezier(.2,.7,.3,1)';
      bot.style.transition='transform .47s cubic-bezier(.2,.7,.3,1)';
      top.style.transform='translateY(-100%)'; bot.style.transform='translateY(100%)'; // open
      Sound.doorOpen();
    });
    setTimeout(()=>wrap.classList.remove('active'), 500);
  }, 300);
}
// Open-only: doors start CLOSED and just slide open (used on first load).
function openBlastDoors(){
  const wrap=document.getElementById('blastdoors');
  const top=wrap.querySelector('.door-top'), bot=wrap.querySelector('.door-bot');
  wrap.classList.add('active');
  top.style.transition='none'; bot.style.transition='none';
  top.style.transform='translateY(0)'; bot.style.transform='translateY(0)'; // start closed
  requestAnimationFrame(()=>{
    setTimeout(()=>{
      top.style.transition='transform .47s cubic-bezier(.2,.7,.3,1)';
      bot.style.transition='transform .47s cubic-bezier(.2,.7,.3,1)';
      top.style.transform='translateY(-100%)'; bot.style.transform='translateY(100%)';
      Sound.doorOpen();
      setTimeout(()=>wrap.classList.remove('active'), 500);
    }, 120);
  });
}

function readInputRaw(){
  let mx=0,my=0;
  if(keys['w'])my-=1;if(keys['s'])my+=1;if(keys['a'])mx-=1;if(keys['d'])mx+=1;
  const m=Math.hypot(mx,my);if(m>0){mx/=m;my/=m;}
  input.mx=mx;input.my=my;
  const me=net.localId?net.getPlayers().find(p=>p.id===net.localId):null;
  if(me){const dx=mouse.x-me.x,dy=mouse.y-me.y,d=Math.hypot(dx,dy)||1;input.aimX=dx/d;input.aimY=dy/d;}
}
function readInput(){
  readInputRaw();
  net.sendInput({...input});
}

function buildTerrain(){

  t.fillStyle=g;t.fillRect(0,0,CFG.arenaW,CFG.arenaH);

    t.fillStyle=Math.random()>.5?`rgba(60,55,30,${Math.random()*.4})`:`rgba(0,0,0,${Math.random()*.3})`;
    const s=Math.random()*2.5;t.fillRect(x,y,s,s);}
  for(let i=0;i<40;i++){t.strokeStyle=`rgba(0,0,0,${Math.random()*.12})`;t.lineWidth=Math.random()*6+2;
    const x=Math.random()*CFG.arenaW,y=Math.random()*CFG.arenaH,a=Math.random()*6.28,len=Math.random()*80+30;
    t.beginPath();t.moveTo(x,y);t.lineTo(x+Math.cos(a)*len,y+Math.sin(a)*len);t.stroke();}

function drawWalls(){
  const tile=CFG.tile;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const v=net.grid[r][c];if(v===0)continue;
    const x=c*tile,y=r*tile,s=tile;
    if(v===1){
      // 2 HP: clean (hp=2) -> broken/cracked (hp=1) -> gone
      const broken = net.hp ? (net.hp[r][c] <= CFG.brickHP-1) : false; // client has no hp grid -> treat as intact
      ctx.fillStyle='#7a3b22';ctx.fillRect(x,y,s,s);
      ctx.strokeStyle='rgba(0,0,0,.45)';ctx.lineWidth=1.5;
      for(let by=0;by<s;by+=10){ctx.beginPath();ctx.moveTo(x,y+by);ctx.lineTo(x+s,y+by);ctx.stroke();
        const off=(Math.floor(by/10)%2)*10;
        for(let bx=off;bx<s;bx+=20){ctx.beginPath();ctx.moveTo(x+bx,y+by);ctx.lineTo(x+bx,y+by+10);ctx.stroke();}}
      ctx.fillStyle='rgba(255,180,140,.12)';ctx.fillRect(x,y,s,3);
      if(broken){ // cracked look
        ctx.fillStyle='rgba(0,0,0,.38)';ctx.fillRect(x,y,s,s);
        ctx.strokeStyle='rgba(0,0,0,.7)';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(x+s*.3,y+1);ctx.lineTo(x+s*.5,y+s*.5);ctx.lineTo(x+s*.32,y+s-1);ctx.stroke();
        ctx.beginPath();ctx.moveTo(x+s*.55,y+s*.5);ctx.lineTo(x+s-1,y+s*.62);ctx.stroke();
        ctx.beginPath();ctx.moveTo(x+1,y+s*.45);ctx.lineTo(x+s*.3,y+s*.5);ctx.stroke();
      }
    } else {
      ctx.fillStyle='#5a6168';ctx.fillRect(x,y,s,s);
      ctx.fillStyle='#6e757c';ctx.fillRect(x+3,y+3,s-6,s-6);
      ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=2;ctx.strokeRect(x+1,y+1,s-2,s-2);
      ctx.fillStyle='#3a3f44';[[6,6],[s-6,6],[6,s-6],[s-6,s-6]].forEach(([dx,dy])=>{ctx.beginPath();ctx.arc(x+dx,y+dy,2,0,6.28);ctx.fill();});
      ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect(x+3,y+3,s-6,3);

}

// ---- ITEM CAPSULES (ported from the item lab) ----
// SINGLE SOURCE OF TRUTH for power-up colors (capsule tint, timer bar, pickup particles all use this)
const PU_COLOR={ steel:'#ffcf3f', speed:'#6fdc5a', rapid:'#ff4d3b', breacher:'#3fe0d8', hull:'#ff79c6', tiny:'#b27bff' };
function puRGB(type){ const h=PU_COLOR[type]||'#ffffff'; return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
const ITEM_TINT={ steel:puRGB('steel'), speed:puRGB('speed'), rapid:puRGB('rapid'), breacher:puRGB('breacher'), hull:puRGB('hull'), tiny:puRGB('tiny') };
function itemBreath(t,phase){
  const period=4.2, x=((t+phase)%period);
  if(x>1.1) return 1.0;
  return 1.0 + Math.sin((x/1.1)*Math.PI)*0.2;
}
function itemGlint(t,phase){
  const period=6.5, x=((t+phase)%period), dur=0.9;
  if(x>dur) return null;
  return x/dur;
}
function drawItemSphere(ctx,R,outLum,glint,tint){
  const g=ctx.createRadialGradient(-R*0.35,-R*0.35,R*0.1, 0,0,R*1.05);
  g.addColorStop(0,'#d8dade');g.addColorStop(0.35,'#9a9ca0');g.addColorStop(0.7,'#54565a');g.addColorStop(1,'#2a2b2e');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,R,0,6.28);ctx.fill();
  if(tint){ ctx.save();ctx.globalCompositeOperation='overlay';ctx.globalAlpha=0.30;
    ctx.fillStyle='rgb('+tint[0]+','+tint[1]+','+tint[2]+')';ctx.beginPath();ctx.arc(0,0,R,0,6.28);ctx.fill();ctx.restore(); }
  ctx.save();ctx.globalAlpha=0.35;
  const g2=ctx.createRadialGradient(R*0.3,R*0.3,R*0.2, 0,0,R);
  g2.addColorStop(0,'rgba(0,0,0,0)');g2.addColorStop(1,'rgba(0,0,0,0.6)');
  ctx.fillStyle=g2;ctx.beginPath();ctx.arc(0,0,R,0,6.28);ctx.fill();ctx.restore();
  ctx.save();ctx.globalAlpha=0.5;ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(-R*0.38,-R*0.4,R*0.18,R*0.12,-0.6,0,6.28);ctx.fill();ctx.restore();
  if(glint!=null){ ctx.save();ctx.beginPath();ctx.arc(0,0,R,0,6.28);ctx.clip();
    ctx.translate((glint*2-1)*R*2.4,0);ctx.rotate(-0.785);
    const bw=R*0.42, lg=ctx.createLinearGradient(-bw,0,bw,0);
    lg.addColorStop(0,'rgba(255,255,255,0)');lg.addColorStop(0.5,'rgba(255,255,255,0.5)');lg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=lg;ctx.fillRect(-bw,-R*4,bw*2,R*8);ctx.restore(); }
  ctx.strokeStyle='rgb('+outLum+','+outLum+','+outLum+')';ctx.lineWidth=2.5;
  ctx.shadowBlur=7;ctx.shadowColor='rgb('+outLum+','+outLum+','+outLum+')';
  ctx.beginPath();ctx.arc(0,0,R+1,0,6.28);ctx.stroke();ctx.shadowBlur=0;
}
function drawItemIcon(ctx,type,fillLum,iconScale){
  ctx.save();if(iconScale)ctx.scale(iconScale,iconScale);
  ctx.fillStyle='rgb('+fillLum+','+fillLum+','+fillLum+')';ctx.strokeStyle='#1a1b1d';ctx.lineJoin='round';ctx.lineCap='round';ctx.lineWidth=1.0;
  if(type==='steel'){
    ctx.beginPath();ctx.moveTo(0,-6.2);ctx.lineTo(5.2,-3.2);ctx.lineTo(5.2,1.6);ctx.quadraticCurveTo(5.2,6,0,7.3);
    ctx.quadraticCurveTo(-5.2,6,-5.2,1.6);ctx.lineTo(-5.2,-3.2);ctx.closePath();ctx.fill();ctx.stroke();
  } else if(type==='speed'){
    const w=6.5, topY=-7, midY=-1.5, botY=7, th=3.2;
    ctx.beginPath();ctx.moveTo(0,topY);ctx.lineTo(w,midY);ctx.lineTo(w-th*0.6,midY+1.2);ctx.lineTo(th*0.5,topY+th*1.5);
    ctx.lineTo(th*0.5,botY);ctx.lineTo(-th*0.5,botY);ctx.lineTo(-th*0.5,topY+th*1.5);ctx.lineTo(-(w-th*0.6),midY+1.2);ctx.lineTo(-w,midY);
    ctx.closePath();ctx.fill();ctx.stroke();
  } else if(type==='rapid'){
    const pts=[[0,-4.0],[-4.0,3.0],[4.0,3.0]];
    for(const p of pts){ ctx.beginPath();ctx.arc(p[0],p[1],2.7,0,6.28);ctx.fill();ctx.stroke(); }
  } else if(type==='hull'){
    // heart (life): two top lobes + bottom point
    ctx.beginPath();
    ctx.moveTo(0,6.5);
    ctx.bezierCurveTo(-7,1.5,-6.5,-5,-2.6,-5);
    ctx.bezierCurveTo(-0.8,-5,0,-3.2,0,-2.2);
    ctx.bezierCurveTo(0,-3.2,0.8,-5,2.6,-5);
    ctx.bezierCurveTo(6.5,-5,7,1.5,0,6.5);
    ctx.closePath();ctx.fill();ctx.stroke();
  } else if(type==='tiny'){
    // dotted square = original size; a tank shrunk to 50% inside = new size
    ctx.save();
    ctx.lineWidth=0.9; ctx.setLineDash([1.6,1.4]);
    ctx.strokeRect(-7,-7,14,14);
    ctx.setLineDash([]);
    ctx.scale(0.5,0.5);
    ctx.beginPath();ctx.rect(-5.4,-4.5,2.2,9);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.rect(3.2,-4.5,2.2,9);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.rect(-4.2,-3.6,8.4,7.2);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.rect(-1.0,-8.5,2.0,5.5);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,2.6,0,6.28);ctx.fill();ctx.stroke();
    ctx.restore();
  } else {
    // breacher: bursting shell
    for(let a=0;a<6.28;a+=Math.PI/3){
      const ca=Math.cos(a),sa=Math.sin(a),px=-sa,py=ca,r0=4.6,r1=8.2,w0=1.5,w1=0.6;
      ctx.beginPath();ctx.moveTo(ca*r0+px*w0,sa*r0+py*w0);ctx.lineTo(ca*r1+px*w1,sa*r1+py*w1);
      ctx.lineTo(ca*r1-px*w1,sa*r1-py*w1);ctx.lineTo(ca*r0-px*w0,sa*r0-py*w0);ctx.closePath();ctx.fill();ctx.stroke();
    }
    ctx.beginPath();ctx.arc(0,0,3.8,0,6.28);ctx.fill();ctx.stroke();
  }
  ctx.restore();
}
function drawPickups(){
  const t=performance.now()/1000;
  for(const k of net.pickups){
    // stable per-item phases from its sequence id so effects are desynced but consistent
    const ph=(k._seq||0)*1.7, bph=(k._seq||0)*0.9, gph=(k._seq||0)*2.1;
    k.bob+=.05;const yy=k.y+Math.sin(k.bob)*3;
    const blend=(Math.sin(t*1.8+bph)+1)/2;
    const outLum=Math.round(50+blend*190);
    const fillLum=235;
    const sphereB=itemBreath(t,ph), lagRaw=itemBreath(t-0.22,ph), spring=1+(lagRaw-1)*1.5;
    const iconScale=spring/sphereB;
    const gl=itemGlint(t,gph);
    ctx.save();ctx.translate(k.x,yy);ctx.scale(sphereB,sphereB);
    drawItemSphere(ctx,13,outLum,gl,ITEM_TINT[k.type]);
    drawItemIcon(ctx,k.type,fillLum,iconScale);
    ctx.restore();
  }
}

function drawFloaters(){
  for(let i=floaters.length-1;i>=0;i--){
    const f=floaters[i];
    f.y-=0.7; f.life-=0.018;
    if(f.life<=0){floaters.splice(i,1);continue;}
    ctx.save();ctx.globalAlpha=Math.min(1,f.life*1.5);
    let col=f.color;
    if(f.blink){ const b=(Math.sin(performance.now()/90)+1)/2; const lum=Math.round(140+b*115); col='rgb('+lum+','+lum+','+lum+')'; }
    else if(f.cblink && f.color && f.color[0]==='#'){ // color-coded flicker: color <-> 75% toward white
      const b=(Math.sin(performance.now()/90)+1)/2;     // 0..1
      const mix=b*0.75;                                  // up to 75% toward white
      const r=parseInt(f.color.slice(1,3),16), g=parseInt(f.color.slice(3,5),16), bl=parseInt(f.color.slice(5,7),16);
      const rr=Math.round(r+(255-r)*mix), gg=Math.round(g+(255-g)*mix), bb=Math.round(bl+(255-bl)*mix);
      col='rgb('+rr+','+gg+','+bb+')';
    }
    ctx.fillStyle=col;ctx.font='11px "Black Ops One"';ctx.textAlign='center';
    ctx.shadowBlur=8;ctx.shadowColor='#000';
    ctx.fillText(f.text,f.x,f.y);ctx.restore();
  }
}

function darkenHex(hex,f){
  if(!hex||hex[0]!=='#'||hex.length<7) return hex;
  const r=parseInt(hex.slice(1,3),16)*f, g=parseInt(hex.slice(3,5),16)*f, b=parseInt(hex.slice(5,7),16)*f;
  return `rgb(${r|0},${g|0},${b|0})`;
}

function drawTank(p){
  const isBet = net.betId===p.id;
  if(!p.alive){
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.deathAng||0);
    // black semi-transparent scorch stamp (random rotation per death)
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.beginPath();
    for(let a=0;a<6.28;a+=0.4){ const rr=15+Math.sin(a*3+(p.deathAng||0)*2)*4; const x=Math.cos(a)*rr,y=Math.sin(a)*rr; if(a===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);} 
    ctx.closePath();ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.35)';ctx.beginPath();ctx.arc(0,0,9,0,6.28);ctx.fill();
    // faint ghost of the tank rect on top
    ctx.globalAlpha=.18;ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.strokeRect(-13,-11,26,22);
    ctx.restore();return;
  }
  const color=p.color, t=performance.now()/1000;
  const fast=p.speedster>0, rapid=p.rapidFire>0, breach=p.breacher>0;

  // SPEED trail: emit fading WHITE ribbon particles behind the tank (long, lingering)
  if(fast){
    const sp=Math.hypot(p.vx,p.vy);
    if(sp>0.5){
      for(let k=0;k<2;k++){
        const bx=p.x-p.vx*(1.5+k*1.4), by=p.y-p.vy*(1.5+k*1.4);
        trail.push({x:bx,y:by,r:8-k*1.5,life:1,color:'#ffffff'});
      }
    }
  }

  ctx.save();ctx.translate(p.x,p.y);
  if(p.tiny>0) ctx.scale(CFG.tinyScale,CFG.tinyScale); // TinyTank: half size
  if(p.invuln>0&&Math.floor(p.invuln/4)%2===0)ctx.globalAlpha=.5;

  // bet ring (outermost)
  if(isBet){ctx.strokeStyle='#ff79c6';ctx.lineWidth=2;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.arc(0,0,CFG.tank.radius+12,0,6.28);ctx.stroke();ctx.setLineDash([]);}

  // ---- HULL + TRACKS ----
  ctx.save();ctx.rotate(p.bodyAng);
  const tW=fast?36:30, tH=fast?7:6, tOff=fast?16:14;
  ctx.fillStyle = fast ? '#9aa0a8' : '#5e636b';
  ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
  ctx.fillRect(-tW/2,-tOff,tW,tH); ctx.strokeRect(-tW/2,-tOff,tW,tH);
  ctx.fillRect(-tW/2,tOff-tH,tW,tH); ctx.strokeRect(-tW/2,tOff-tH,tW,tH);
  if(fast){
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-tW/2+2,-tOff+tH/2);ctx.lineTo(tW/2-2,-tOff+tH/2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-tW/2+2,tOff-tH/2);ctx.lineTo(tW/2-2,tOff-tH/2);ctx.stroke();
  } else {
    ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1;
    for(let i=-tW/2+3;i<tW/2;i+=4){ctx.beginPath();ctx.moveTo(i,-tOff);ctx.lineTo(i,-tOff+tH);ctx.stroke();ctx.beginPath();ctx.moveTo(i,tOff-tH);ctx.lineTo(i,tOff);ctx.stroke();}
  }
  // body: color at 75% value, black outline (white flash on taking a non-lethal hit)
  ctx.fillStyle = p.hitFlash>0 ? '#ffffff' : darkenHex(color,0.85);
  ctx.strokeStyle='#000'; ctx.lineWidth=2;
  ctx.fillRect(-13,-9,26,18); ctx.strokeRect(-13,-9,26,18);
  ctx.restore();

  // ---- CANNON + TURRET ----
  const ta=Math.atan2(p.aimY,p.aimX);
  ctx.save();ctx.rotate(ta);
  if(breach){
    ctx.fillStyle='#e6e9ec'; ctx.strokeStyle='#000'; ctx.lineWidth=2;
    ctx.fillRect(0,-7,24,14); ctx.strokeRect(0,-7,24,14);
  } else {
    ctx.fillStyle='#7c828a'; ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
    ctx.fillRect(0,-3.5,22,7); ctx.strokeRect(0,-3.5,22,7);
  }
  ctx.strokeStyle='#000'; ctx.lineWidth=2;
  if(rapid){
    ctx.fillStyle=color;
    ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(-2,-9);ctx.lineTo(2,0);ctx.lineTo(-2,9);ctx.closePath();
    ctx.fill();ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(-8,-4,1.8,0,6.28);ctx.fill();
    ctx.beginPath();ctx.arc(-8,4,1.8,0,6.28);ctx.fill();
    ctx.beginPath();ctx.arc(-11,0,1.8,0,6.28);ctx.fill();
  } else {
    ctx.fillStyle=color;ctx.beginPath();ctx.arc(0,0,8,0,6.28);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();ctx.arc(0,0,4,0,6.28);ctx.fill();
  }
  ctx.restore();
  ctx.restore();

  // ---- SHIELD: wavy white ring (pulses, always white) ----
  if(p.shield>0){
    ctx.save();ctx.translate(p.x,p.y);
    ctx.strokeStyle='#ffffff'; ctx.globalAlpha=0.9; ctx.lineWidth=2.5;
    ctx.shadowBlur=8; ctx.shadowColor='#ffffff';
    ctx.beginPath();
    const baseR=CFG.tank.radius+7, pulse=0.6+0.4*Math.sin(t*1.3);
    for(let a=0;a<=6.30;a+=0.16){
      const wob=Math.sin(a*5-t*4)*1.7*pulse + Math.sin(a*3+t*2)*0.8;
      const rr=baseR+wob, x=Math.cos(a)*rr, y=Math.sin(a)*rr;
      if(a===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.closePath();ctx.stroke();ctx.restore();
  }

  // name + COLOR-CODED life pellets
  ctx.fillStyle=isBet?'#ff79c6':color;ctx.font='9px "Black Ops One"';ctx.textAlign='center';
  ctx.fillText(p.name,p.x,p.y-22);
  for(let i=0;i<CFG.startLives;i++){
    ctx.fillStyle = i<p.lives ? color : 'rgba(255,255,255,.15)';
    ctx.fillRect(p.x-10+i*8,p.y+20,5,3);
  }
  // TIMED power-up bars: each color-coded, empties as it runs out, stacked under the tank.
  // [value, maxDuration, color]
  const bars=[];
  if(p.rapidFire>0) bars.push([p.rapidFire, CFG.dur.rapid,    PU_COLOR.rapid]);    // red
  if(p.breacher>0)  bars.push([p.breacher,  CFG.dur.breacher, PU_COLOR.breacher]); // cyan
  if(p.speedster>0) bars.push([p.speedster, CFG.dur.speed,    PU_COLOR.speed]);    // green
  if(p.tiny>0)      bars.push([p.tiny,      CFG.dur.tiny,     PU_COLOR.tiny]);     // purple
  // shield: only show a bar for the PICKUP shield (long), not the brief spawn shield
  if(p.shield>CFG.startShield) bars.push([p.shield, CFG.dur.shield, PU_COLOR.steel]); // yellow
  const prad=CFG.tank.radius*(p.tiny>0?CFG.tinyScale:1);
  bars.forEach((bar,bi)=>{
    const val=bar[0],max=bar[1],c=bar[2];
    const frac=Math.max(0,Math.min(1,val/max));
    const bw=26, by=p.y+prad+11+bi*5;
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(p.x-bw/2,by,bw,3);
    ctx.fillStyle=c;ctx.fillRect(p.x-bw/2,by,bw*frac,3);
  });
}

function drawBullets(){
  const tt=performance.now()/1000;
  for(const b of net.bullets){
    const rad=b.radius||3;
    const R=b.breach?rad:Math.max(3.5,rad);
    ctx.save();
    // motion trail (faint, tinted)
    ctx.globalAlpha=0.5;ctx.strokeStyle=b.color;ctx.lineWidth=b.breach?5:2.5;ctx.lineCap='round';
    ctx.shadowBlur=b.breach?20:12;ctx.shadowColor=b.color;
    ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-b.vx*1.4,b.y-b.vy*1.4);ctx.stroke();
    ctx.globalAlpha=1;
    if(b.breach){
      // INCANDESCENT orb: hot white center, intense color-tinted glow, pulsing bright ring
      const pulse=0.5+0.5*Math.sin(tt*14);
      const g=ctx.createRadialGradient(b.x,b.y,0, b.x,b.y,R*2.6);
      g.addColorStop(0,'#ffffff');
      g.addColorStop(0.45,'#ffffff');
      g.addColorStop(0.7,b.color);
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.shadowBlur=26;ctx.shadowColor=b.color;
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(b.x,b.y,R*2.6,0,6.28);ctx.fill();
      // pulsing bright ring (white, lightly tinted by glow)
      ctx.shadowBlur=14;ctx.shadowColor='#ffffff';
      ctx.globalAlpha=0.6+0.4*pulse;ctx.strokeStyle='#ffffff';ctx.lineWidth=1.6;
      ctx.beginPath();ctx.arc(b.x,b.y,R*(1.15+0.25*pulse),0,6.28);ctx.stroke();
      ctx.globalAlpha=1;
      // hot core
      ctx.shadowBlur=0;ctx.fillStyle='#ffffff';
      ctx.beginPath();ctx.arc(b.x,b.y,R*0.8,0,6.28);ctx.fill();
    } else {
      // normal: glowing orb, white core fading to owner color
      const g=ctx.createRadialGradient(b.x,b.y,0, b.x,b.y,R*2.1);
      g.addColorStop(0,'#ffffff');
      g.addColorStop(0.35,'#ffffff');
      g.addColorStop(0.62,b.color);
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.shadowBlur=14;ctx.shadowColor=b.color;
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(b.x,b.y,R*2.1,0,6.28);ctx.fill();
      ctx.shadowBlur=0;ctx.fillStyle='#ffffff';
      ctx.beginPath();ctx.arc(b.x,b.y,R*0.62,0,6.28);ctx.fill();
    }
    ctx.restore();
  }
}

function spawnParticles(x,y,color,n,spd,sz){for(let i=0;i<n;i++){const a=Math.random()*6.28,s=Math.random()*spd;
  particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,color,sz:Math.random()*(sz||3)+1});}}
function spawnRing(x,y,color,max){particles.push({ring:true,x,y,r:4,max:max||34,life:1,color});}
function spawnCollapseRing(x,y,color){particles.push({ring:true,collapse:true,x,y,r:40,max:6,life:1,color});}
function spawnDebris(x,y,color,n){for(let i=0;i<n;i++){const a=Math.random()*6.28,s=Math.random()*5+1;
  particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1.3,color,sz:Math.random()*3+2,grav:0.12,spin:Math.random()*0.4-0.2,rot:Math.random()*6.28});}}

function drainEvents(){
  for(const e of net.events){
    if(e.t==='shot'){spawnParticles(e.x,e.y,e.breach?'#ffffff':'#ffd98a',e.breach?8:5,3);Sound.shot(e.breach);}
    else if(e.t==='boom'){const c=e.breach?'#b27bff':'#ffae5b';spawnParticles(e.x,e.y,c,e.breach?14:8,3.5,2.5);spawnRing(e.x,e.y,c,e.breach?28:18);shake=Math.max(shake,e.breach?5:3);}
    else if(e.t==='spark'){spawnParticles(e.x,e.y,'#cfd6dd',8,3.5,2);Sound.metal();}
    else if(e.t==='brickhit'){spawnParticles(e.x,e.y,'#c06a3f',10,3,2.5);Sound.brickHit();}
    else if(e.t==='brickbreak'){spawnDebris(e.x,e.y,'#7a3b22',18);spawnParticles(e.x,e.y,'#c06a3f',16,3,2.5);shake=Math.max(shake,6);Sound.brickBreak();}
    else if(e.t==='steelshatter'){spawnDebris(e.x,e.y,'#6e757c',22);spawnParticles(e.x,e.y,'#cfd6dd',14,4,2.5);spawnRing(e.x,e.y,'#b27bff',40);shake=Math.max(shake,10);Sound.steelShatter();}
    else if(e.t==='hit'){spawnParticles(e.x,e.y,e.color,14,4);shake=Math.max(shake,6);Sound.hit();}
    else if(e.t==='explosion'){ // beefed-up death
      spawnParticles(e.x,e.y,'#fff',12,9,3);
      spawnParticles(e.x,e.y,'#ffd98a',30,7,4);
      spawnParticles(e.x,e.y,'#ff7a3b',34,6,4);
      spawnParticles(e.x,e.y,e.color,20,5,3);
      spawnDebris(e.x,e.y,e.color,12);
      spawnRing(e.x,e.y,'#fff',24);spawnRing(e.x,e.y,'#ffd98a',44);spawnRing(e.x,e.y,e.color,60);
      floaters.push({text:'-1',x:e.x,y:e.y-10,color:'#fff',life:1,blink:true}); // lost a point
      shake=Math.max(shake,18);Sound.explosion();}
    else if(e.t==='spawnscore'){ floaters.push({text:String(e.score),x:e.x,y:e.y-24,color:e.color,life:1.1,cblink:true}); } // current score on (re)spawn
    else if(e.t==='killscore'){ floaters.push({text:String(e.score),x:e.x,y:e.y-30,color:e.color,life:1.1,cblink:true}); // updated score on a kill
      if(e.rank){ floaters.push({text:e.rank==='first'?'FIRST!':'TIED!',x:e.x,y:e.y-18,color:e.color,life:1.1,cblink:true}); } }
    else if(e.t==='spawnblast'){spawnRing(e.x,e.y,e.color,CFG.spawnBlast.radius);spawnRing(e.x,e.y,'#fff',CFG.spawnBlast.radius*0.7);spawnParticles(e.x,e.y,e.color,24,6,3);shake=Math.max(shake,9);Sound.spawnblast();}
    else if(e.t==='pickup'){const c=PU_COLOR[e.kind]||'#fff';spawnParticles(e.x,e.y,c,18,4.5);spawnRing(e.x,e.y,c);Sound.pickup();
      const pl=net.getPlayers().find(q=>q.id===e.playerId);
      if(pl) floaters.push({text:e.label,x:pl.x,y:pl.y-26,color:'#fff',life:1,blink:true});}
    else if(e.t==='itemspawn'){const c=PU_COLOR[e.kind]||'#fff';spawnCollapseRing(e.x,e.y,'#fff');spawnRing(e.x,e.y,c,20);}
    else if(e.t==='itemexpire'){spawnParticles(e.x,e.y,'#555',8,2);}
    else if(e.t==='itemdestroyed'){ floaters.push({text:e.label,x:e.x,y:e.y-20,color:'#fff',life:1,blink:true}); }
    else if(e.t==='shieldbreak'){
      // strong, clearly-communicated shatter: bright white flash ring + colored shards + a second expanding ring
      spawnRing(e.x,e.y,'#ffffff',CFG.tank.radius+10);
      spawnRing(e.x,e.y,e.color||'#4d9fff',CFG.tank.radius+24);
      spawnParticles(e.x,e.y,'#ffffff',16,6);
      spawnParticles(e.x,e.y,e.color||'#4d9fff',22,5);
      floaters.push({text:'SHIELD DOWN',x:e.x,y:e.y-24,color:'#fff',life:0.8,blink:true});
      shake=Math.max(shake,9);Sound.shieldBreak();
    }
    else if(e.t==='steelbreak'){spawnParticles(e.x,e.y,e.color||'#4d9fff',20,5);shake=Math.max(shake,6);Sound.steelBreak();}
    else if(e.t==='countbeep'){startFx={n:e.n,life:1};Sound.countbeep();locatorWaves.push({t:0});}
    else if(e.t==='go'){startFx={n:'GO!',life:1};Sound.go();}
    else if(e.t==='powerdown'){Sound.powerdown();}
    else if(e.t==='bulletfizzle'){ spawnParticles(e.x,e.y,'#9a9a8a',5,1.6,2); }
    else if(e.t==='matchend'){/* win/lose sound handled in showResults */}
  }
  net.events.length=0;
}

function drawTrail(){
  for(let i=trail.length-1;i>=0;i--){
    const d=trail[i];
    d.life-=0.047;          // ~75% of previous duration (was 0.035)
    if(d.life<=0){trail.splice(i,1);continue;}
    ctx.save();
    ctx.globalAlpha=d.life*0.49;  // 75% of previous 0.65 opacity
    ctx.fillStyle=d.color;
    ctx.shadowBlur=10;ctx.shadowColor='#ffffff';
    ctx.beginPath();ctx.arc(d.x,d.y,d.r*d.life,0,6.28);ctx.fill();
    ctx.restore();
  }
}

function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];
    if(p.ring){p.r+=(p.max-p.r)*.18;p.life-=.06;if(p.life<=0){particles.splice(i,1);continue;}
      ctx.globalAlpha=p.life;ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.stroke();ctx.globalAlpha=1;continue;}
    p.x+=p.vx;p.y+=p.vy;
    if(p.grav){p.vy+=p.grav;p.vx*=.97;p.life-=.025;p.rot+=p.spin;}
    else{p.vx*=.9;p.vy*=.9;p.life-=.04;}
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.globalAlpha=Math.min(1,p.life);ctx.fillStyle=p.color;
    if(p.grav){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz);ctx.restore();}
    else ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
    ctx.globalAlpha=1;}
}

function drawSpawnBeacons(){
  const t=performance.now()/1000;
  const blinkOn = Math.sin(t*4)>0;   // center blinks black <-> player color
  for(const p of net.getPlayers()){
    const cx=p.spawnX, cy=p.spawnY, R=CFG.tile*1.05;
    ctx.save();
    ctx.translate(cx,cy);
    // outer tech ring
    ctx.strokeStyle=p.color;ctx.globalAlpha=0.35;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(0,0,R,0,6.28);ctx.stroke();
    // dashed mid ring
    ctx.globalAlpha=0.3;ctx.setLineDash([4,6]);
    ctx.beginPath();ctx.arc(0,0,R*0.62,0,6.28);ctx.stroke();ctx.setLineDash([]);
    // blinking center: black <-> player color
    ctx.globalAlpha=0.9;
    ctx.fillStyle = blinkOn ? p.color : '#000';
    ctx.beginPath();ctx.arc(0,0,5,0,6.28);ctx.fill();
    ctx.strokeStyle=p.color;ctx.lineWidth=1.5;ctx.globalAlpha=0.6;
    ctx.beginPath();ctx.arc(0,0,5,0,6.28);ctx.stroke();
    ctx.restore();
  }
}

let locatorWaves=[]; // each: {t:0} collapsing wave toward the active tank
function drawLocatorRing(){
  const activeId = net.localId || net.betId;
  if(!activeId){ locatorWaves=[]; return; }
  const tank = net.getPlayers().find(p=>p.id===activeId);
  if(!tank){ return; }
  const maxR = Math.hypot(CFG.arenaW, CFG.arenaH) * 1.1;
  for(let i=locatorWaves.length-1;i>=0;i--){
    const w=locatorWaves[i];
    w.t += 0.02;                          // collapses in ~50 frames = one countdown number, so the "1" wave lands exactly on GO
    if(w.t>=1){ locatorWaves.splice(i,1); continue; }
    const ease = 1 - Math.pow(1-w.t, 2.2);
    const r = maxR * (1 - ease);
    ctx.save();
    ctx.translate(tank.x, tank.y);
    for(let k=0;k<4;k++){
      const rr = r + k*26*(1-ease);
      if(rr<=0) continue;
      ctx.globalAlpha = (1-w.t) * (0.5 - k*0.11);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3 - k*0.5;
      ctx.shadowBlur = 12; ctx.shadowColor='#fff';
      ctx.beginPath(); ctx.arc(0,0,rr,0,6.28); ctx.stroke();
    }
    ctx.restore();
  }
}

function drawStartCountdown(){
  if(!startFx)return;
  startFx.life-=0.022;
  if(startFx.life<=0){startFx=null;return;}
  const isGo = startFx.n==='GO!';
  // scale shrinks as it appears (starts big, settles); GO! pops bigger
  const t=startFx.life;
  const scale = isGo ? (1.4 - t*0.4) : (0.6 + t*1.6);
  ctx.save();
  ctx.globalAlpha=Math.min(1,t*1.4);
  ctx.translate(CFG.arenaW/2, CFG.arenaH/2);
  ctx.scale(scale,scale);
  ctx.font='64px "Black Ops One"';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=isGo?'#6fdc5a':'#e9e6d8';
  ctx.shadowBlur=24;ctx.shadowColor=isGo?'#6fdc5a':'#000';
  ctx.fillText(startFx.n,0,0);
  ctx.restore();ctx.textBaseline='alphabetic';
}

function updateHUD(){
  const me=net.localId?net.getPlayers().find(p=>p.id===net.localId):null;
  if(me){   // it's MY tank (host=human, client=remote) — show my stats either way
    reloadWrap.classList.remove('hidden');
    hudEl.innerHTML=`<div class="stat"><label>HULL</label><b>${me.lives}</b></div><div class="stat"><label>KILLS</label><b>${me.kills}</b></div>`;
    let fullCd;
    if(me.rapidFire>0 && me.breacher>0) fullCd=24;
    else if(me.rapidFire>0) fullCd=12;
    else if(me.breacher>0) fullCd=48;
    else fullCd=CFG.fireCooldown;
    const pct=1-(me.cooldown/fullCd);
    reloadFill.style.width=(Math.max(0,Math.min(1,pct))*100)+'%';reloadEl.className='reload '+(me.cooldown<=0?'':'charging');
    const pw=[];if(me.shield>0)pw.push(['SHIELD',me.color]);if(me.rapidFire>0)pw.push(['RAPID','#ff4d3b']);if(me.speedster>0)pw.push(['SPEED','#ffcf3f']);if(me.breacher>0)pw.push(['BREACHER','#b27bff']);
    powerupsEl.innerHTML=pw.map(([t,c])=>`<span class="pwr" style="color:${c};border-color:${c}">${t}</span>`).join('');
  } else { // my tank not in the snapshot yet (e.g. between death/respawn or first frames)
    hudEl.innerHTML=`<div class="stat"><label>HULL</label><b>—</b></div><div class="stat"><label>KILLS</label><b>—</b></div>`;
    reloadWrap.classList.add('hidden');
  }
  // timer
  const tl=Math.max(0,net.timeLeft);
  if(tl!==lastTimeShown){ if(tl<=5&&tl>0)Sound.countdownBeep(tl<=3); lastTimeShown=tl; }
  const mm=Math.floor(tl/60),ss=tl%60;
  timerEl.textContent=`${mm}:${ss<10?'0':''}${ss}`;
  timerEl.className='timer'+(tl<=10?' warn':'');
  // scoreboard
  scoreboardEl.innerHTML='';
  [...net.getPlayers()].sort((a,b)=>b.kills-a.kills).forEach(p=>{
    const row=document.createElement('div');row.className='row'+(net.betId===p.id?' bet':'');
    row.innerHTML=`<span class="nm">${p.name}</span><span class="kc" style="color:${p.color}">${p.kills}</span><span class="dot" style="background:${p.color}"></span>`;
    scoreboardEl.appendChild(row);
  });
}

// ---- FIREWORKS (results screen, only when the human wins) ----
let fwRunning=false, fwParticles=[], fwCanvas=null, fwCtx=null, fwLast=0, fwSpawnT=0;
const FW_COLORS=['#ffcf3f','#6fdc5a','#ff4d3b','#3fe0d8','#ff79c6','#b27bff','#ffffff'];
function fwBurst(x,y){
  const col=FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)];
  const n=26+Math.floor(Math.random()*16);
  for(let i=0;i<n;i++){
    const a=(i/n)*6.28+Math.random()*0.2, sp=1.5+Math.random()*3.2;
    fwParticles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,col,sz:1.5+Math.random()*1.5});
  }
}
function fwFrame(ts){
  if(!fwRunning)return;
  if(!fwCanvas){fwCanvas=document.getElementById('fireworks');if(fwCanvas){fwCtx=fwCanvas.getContext('2d');}}
  if(fwCanvas){
    const r=fwCanvas.getBoundingClientRect();
    if(fwCanvas.width!==r.width||fwCanvas.height!==r.height){fwCanvas.width=r.width;fwCanvas.height=r.height;}
    const W=fwCanvas.width,H=fwCanvas.height;
    fwCtx.clearRect(0,0,W,H);
    // occasionally launch a new burst
    fwSpawnT-=1; if(fwSpawnT<=0){ fwBurst(W*(0.2+Math.random()*0.6), H*(0.2+Math.random()*0.45)); fwSpawnT=18+Math.random()*22; }
    for(let i=fwParticles.length-1;i>=0;i--){
      const p=fwParticles[i];
      p.vy+=0.035; p.vx*=0.985; p.vy*=0.985; p.x+=p.vx; p.y+=p.vy; p.life-=0.018;
      if(p.life<=0){fwParticles.splice(i,1);continue;}
      fwCtx.globalAlpha=Math.max(0,p.life);
      fwCtx.fillStyle=p.col; fwCtx.shadowBlur=8; fwCtx.shadowColor=p.col;
      fwCtx.beginPath();fwCtx.arc(p.x,p.y,p.sz*p.life,0,6.28);fwCtx.fill();
    }
    fwCtx.globalAlpha=1;fwCtx.shadowBlur=0;
  }
  requestAnimationFrame(fwFrame);
}
function startFireworks(){ if(fwRunning)return; fwRunning=true; fwParticles=[]; fwSpawnT=0;
  // a few immediate bursts so the win is unmistakable
  setTimeout(()=>{ if(fwCanvas){const W=fwCanvas.width||600,H=fwCanvas.height||340; fwBurst(W*0.3,H*0.35);fwBurst(W*0.7,H*0.3);fwBurst(W*0.5,H*0.45);} },30);
  requestAnimationFrame(fwFrame); }
function stopFireworks(){ fwRunning=false; fwParticles=[]; if(fwCtx&&fwCanvas)fwCtx.clearRect(0,0,fwCanvas.width,fwCanvas.height); }

function showResults(){
  resultsEl.classList.add('show');
  const ranked=net.ranking||[...net.getPlayers()].sort((a,b)=>b.kills-a.kills);
  const top=ranked[0];
  const meHuman=net.localId?net.getPlayers().find(p=>p.id===net.localId):null;
  // winner name color-coded with their tank color, injected as a span
  const winSpan=`<span style="color:${top.color}">${top.name}</span>`;
  // DRAW: 2+ tanks share the top score
  const topScore=top.kills;
  const tiedTop=ranked.filter(p=>p.kills===topScore);
  const isDraw=tiedTop.length>1;

  if(isDraw){
    resTitle.textContent='STALEMATE!';
    resTitle.style.color='var(--ink)';
    const names=tiedTop.map(p=>p.name).join(' & ');
    resBet.innerHTML=`<span style="color:var(--ink)">${names} tied at ${topScore} ${topScore===1?'kill':'kills'}.</span>`;
    Sound.end();
  } else if(meHuman && meHuman.kind==='human'){
    const won=top.id===meHuman.id;
    resTitle.textContent=won?'YARD SECURED':'YARD LOST';
    resTitle.style.color=won?meHuman.color:'var(--ink)';
    resBet.innerHTML=won?'You topped the board.':`${winSpan} took it with ${top.kills} kills.`;
    if(won){ Sound.fanfare(); startFireworks(); } else { Sound.end(); }
  } else if(net.betId){
    const bet=ranked.find(p=>p.id===net.betId);
    const place=ranked.indexOf(bet)+1;
    const won=place===1;
    resTitle.textContent=won?'BET PAID OFF':'YARD LOST';
    resTitle.style.color=won?bet.color:'var(--ink)';
    resBet.innerHTML=won?`<span style="color:${bet.color}">${bet.name}</span> won — good eye.`:`You bet on <span style="color:${bet.color}">${bet.name}</span> (#${place}). ${winSpan} took it.`;
    if(won){ Sound.fanfare(); startFireworks(); } else { Sound.end(); }
  } else {
    resTitle.textContent='YARD LOST';resBet.innerHTML=`${winSpan} wins with ${top.kills} kills.`;
    Sound.end();
  }
  leaderboardEl.innerHTML='';
  ranked.forEach((p,i)=>{
    const row=document.createElement('div');
    row.className='lb-row'+(net.betId===p.id?' betrow':'');
    // only a SINGLE clear winner gets the color-coded border (never on a draw)
    if(i===0 && !isDraw){
      row.style.borderColor=p.color;
      row.style.boxShadow=`0 0 14px ${p.color}44`;
    }
    const rankColored = (i===0 && !isDraw);
    row.innerHTML=`<span class="lb-rank"${rankColored?` style="color:${p.color}"`:''}>${i+1}</span><span class="lb-dot" style="background:${p.color}"></span><span class="lb-name" style="color:${p.color}">${p.name}</span><span class="lb-kills">${p.kills}</span>`;
    leaderboardEl.appendChild(row);
  });
}

// Fixed-timestep simulation decoupled from rendering. setInterval keeps ticking even when the
// tab is backgrounded (rAF can fully pause), and we accumulate REAL elapsed time so the sim
// advances the right number of steps regardless of frame rate or focus.
const SIM_DT=1000/60;          // target 60 steps/sec
let _simAcc=0, _simLast=0, _simTimer=null;
function startSimLoop(){
  stopSimLoop();
  _simLast=performance.now(); _simAcc=0;
  _simTimer=setInterval(()=>{
    if(!running){ stopSimLoop(); return; }
    const now=performance.now(); let dt=now-_simLast; _simLast=now;
    if(dt>250) dt=250;          // clamp huge gaps (tab was hidden a long time) to avoid a spiral
    _simAcc+=dt;
    let steps=0;
    while(_simAcc>=SIM_DT && steps<8){   // catch up, capped so we never freeze
      readInput(); net.step(); _simAcc-=SIM_DT; steps++;
      if(!net._running) break;
    }
    drainEvents();
    if(!net._running){ running=false; stopSimLoop(); showResults(); }
  }, SIM_DT);
}
function stopSimLoop(){ if(_simTimer){ clearInterval(_simTimer); _simTimer=null; } }

function loop(){
  startSimLoop();   // host: timed simulation
  render();         // rAF: drawing only
}
function render(){
  if(!running)return;
  ctx.save();
  if(shake>0){ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);shake*=.85;if(shake<.3)shake=0;}
  drawTerrain();drawSpawnBeacons();drawWalls();drawBeacons();drawPickups();drawTrail();drawBullets();
  for(const p of net.getPlayers())drawTank(p);
  drawParticles();drawFloaters();drawLocatorRing();drawStartCountdown();ctx.restore();
  updateHUD();
  if(!running) return;
  requestAnimationFrame(render);
}

document.addEventListener('pointerdown',e=>{ if(e.target.closest('.btn,.kindBtn,.miniBtn,.persPill,#wcReroll,.closeBtn')){ Sound.init&&Sound.init(); Sound.uiClick&&Sound.uiClick(); } });
